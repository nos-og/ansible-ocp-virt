- hosts: all  # Target all hosts in your inventory
  vars:
    namespace: clusters
    clustername: clustername
  tasks:
  - name: Create a secret for pullsecret
    redhat.openshift.k8s:
      state: present
      definition:
        apiVersion: v1
        kind: Secret
        metadata:
          name: pullsecret-cluster-{{ clustername }}
          namespace: 'clusters'
        type: kubernetes.io/dockerconfigjson
        stringData:
          '.dockerconfigjson': |-
            {"auths":{"cloud.openshift.com":{"auth":"b3BlbnNoaWZ0LXJlbGVhc2UtZGV2K29jbV9hY2Nlc3NfN2QzOWU4NGRjZDk0NDE5NDliMTM0NmYzNTgxN2I2NzM6Nk5IRlgwVkpNTERMTVlPTEY4N0lGQVNEMkpHTlUwVTBSVjNWM01SUlRaTEI0RUg4OTVVUVNLOUtNQVZUWE0zUA==","email":"m-nara@netone.co.jp"},"quay.io":{"auth":"b3BlbnNoaWZ0LXJlbGVhc2UtZGV2K29jbV9hY2Nlc3NfN2QzOWU4NGRjZDk0NDE5NDliMTM0NmYzNTgxN2I2NzM6Nk5IRlgwVkpNTERMTVlPTEY4N0lGQVNEMkpHTlUwVTBSVjNWM01SUlRaTEI0RUg4OTVVUVNLOUtNQVZUWE0zUA==","email":"m-nara@netone.co.jp"},"registry.connect.redhat.com":{"auth":"","email":"m-nara@netone.co.jp"},"registry.redhat.io":{"auth":"","email":"m-nara@netone.co.jp"}}}

  - name: Create a secret for ssh key
    redhat.openshift.k8s:
      state: present
      definition:
        apiVersion: v1
        kind: Secret
        metadata:
          name: sshkey-cluster-{{ clustername }}
          namespace: 'clusters'
        stringData:
          'id_rsa.pub': ssh-rsa  nos@tanzu-step

  - name: Create a Hosted Cluster
    redhat.openshift.k8s:
      state: present
      definition:
        apiVersion: hypershift.openshift.io/v1beta1
        kind: HostedCluster
        metadata:
          name: {{ clustername }}
          namespace: 'clusters'
          labels:
            "cluster.open-cluster-management.io/clusterset": 'default'
        spec:
          additionalTrustBundle:
            name: user-ca-bundle
          etcd:
            managed:
              storage:
                persistentVolume:
                  size: 8Gi
                  storageClassName: netapp
                type: PersistentVolume
            managementType: Managed
          release:
            image: quay.io/openshift-release-dev/ocp-release:4.20.16-multi
          pullSecret:
            name: pullsecret-cluster-{{ clustername }}
          sshKey:
            name: sshkey-cluster-{{ clustername }}
          networking:
            clusterNetwork:
              - cidr: 10.132.0.0/14
            serviceNetwork:
              - cidr: 172.31.0.0/16
            networkType: OVNKubernetes
          controllerAvailabilityPolicy: SingleReplica
          infrastructureAvailabilityPolicy: SingleReplica
          platform:
            type: KubeVirt
            kubevirt:
              baseDomainPassthrough: true
          infraID: {{ clustername }}
          services:
            - service: OAuthServer
              servicePublishingStrategy:
                type: Route
            - service: OIDC
              servicePublishingStrategy:
                type: Route
            - service: Konnectivity
              servicePublishingStrategy:
                type: Route
            - service: Ignition
              servicePublishingStrategy:
                type: Route
            - service: APIServer
              servicePublishingStrategy:
                type: LoadBalancer

  - name: Create a NodePool
    redhat.openshift.k8s:
      state: present
      definition:
        apiVersion: hypershift.openshift.io/v1beta1
        kind: NodePool
        metadata:
          name: '{{ clustername }}-nodepool'
          namespace: 'clusters'
        spec:
          arch: amd64
          clusterName: {{ clustername }}
          replicas: 2
          management:
            autoRepair: false
            upgradeType: Replace
          platform:
            type: KubeVirt
            kubevirt:
              compute:
                cores: 2
                memory: 8Gi
              rootVolume:
                type: Persistent
                persistent:
                  size: 32Gi
                  storageClass: netapp
              attachDefaultNetwork: true
          release:
            image: quay.io/openshift-release-dev/ocp-release:4.20.15-multi

  - name: Create a ManagedCluster
    redhat.openshift.k8s:
      state: present
      definition:
        apiVersion: cluster.open-cluster-management.io/v1
        kind: ManagedCluster
        metadata:
          annotations:
            import.open-cluster-management.io/hosting-cluster-name: local-cluster
            import.open-cluster-management.io/klusterlet-deploy-mode: Hosted
            open-cluster-management/created-via: hypershift
          labels:
            cloud: BareMetal
            vendor: OpenShift
            name: {{ clustername }}
            cluster.open-cluster-management.io/clusterset: 'default'
          name: {{ clustername }}
        spec:
          hubAcceptsClient: true

  - name: Create a KlusterletAddonConfig
    redhat.openshift.k8s:
      state: present
      definition:
        apiVersion: agent.open-cluster-management.io/v1
        kind: KlusterletAddonConfig
        metadata:
          name: {{ clustername }}
          namespace: {{ clustername }}
        spec:
          clusterName: {{ clustername }}
          clusterNamespace: {{ clustername }}
          clusterLabels:
            cloud: BareMetal
            vendor: OpenShift
          applicationManager:
            enabled: true
          policyController:
            enabled: true
          searchCollector:
            enabled: true
          certPolicyController:
            enabled: true
